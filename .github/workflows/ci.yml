name: CI

permissions: {}

on:
  pull_request:
  push:
    branches:
      - alpha
      - beta
      - main
      - renovate/**

jobs:
  ci-optimization:
    name: CI optimization
    uses: dargmuesli/github-actions/.github/workflows/ci-optimization.yml@b24aec150dd9a8562cd773dbd85487e56e46fdc6 # 5.7.0
    permissions:
      pull-requests: read
  build:
    needs: ci-optimization
    if: needs.ci-optimization.outputs.continue == 'true'
    name: Update generated docs
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - name: Regenerate docs
        run: |
          go install github.com/dargstack/dargstack/v4/cmd/dargstack@v4.7.0
          export PATH="$(go env GOPATH)/bin:$PATH"
          dargstack document
      - name: Commit and push updated docs
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add artifacts/docs/
          if git diff --staged --quiet; then
            echo "Docs are already up to date"
          else
            git commit -m "chore: update generated docs"
            git push
          fi
  release-semantic:
    needs: build
    name: Semantic Release
    uses: dargmuesli/github-actions/.github/workflows/release-semantic.yml@b24aec150dd9a8562cd773dbd85487e56e46fdc6 # 5.7.0
    permissions:
      contents: write
      id-token: write
    secrets:
      PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
