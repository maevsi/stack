name: CI

permissions: {}

on:
  pull_request:
  push:
    branches:
      - alpha
      - beta
      - main
      - renovate/**

jobs:
  ci-optimization:
    name: CI optimization
    uses: dargmuesli/github-actions/.github/workflows/ci-optimization.yml@c980106b984bec43dd538a9d24ecc2212967797d # 5.3.0
    permissions:
      pull-requests: read
  build:
    needs: ci-optimization
    if: needs.ci-optimization.outputs.continue == 'true'
    name: dargstack rgen
    uses: dargmuesli/github-actions/.github/workflows/dargstack-rgen.yml@c980106b984bec43dd538a9d24ecc2212967797d # 5.3.0
    permissions:
      contents: read
    with:
      APT_PACKAGES: mkcert
  release-semantic:
    needs: build
    name: Semantic Release
    uses: dargmuesli/github-actions/.github/workflows/release-semantic.yml@c980106b984bec43dd538a9d24ecc2212967797d # 5.3.0
    permissions:
      contents: write
      id-token: write
    secrets:
      PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
    with:
      COREPACK_ENABLED: true
      EXTRA_PLUGINS: |
        @semantic-release/exec
